<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Timer Game</title>
</head>
<body>
    <header>
    <h1 class="title">Timer Game</h1>
    </header>
    <main>
        <div id="goal">
        <h2 class="goal-time">The Goal time is: <span id="goal-time-num"> </span> </h2>
        <button id="change-goal-btn">Change goal time</button>
        </div>

    <div class="playing-area player-1">
        <h1>Player 1</h1>
        <div class="timer">00.00</div>
        <button class="stop-button">Stop
        </button>
    </div>
    <div class="playing-area player-2">
        <h1>Player 2</h1>
        <div class="timer">00.00</div>
        <button class="stop-button">Stop
        </button>
    </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
